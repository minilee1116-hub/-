name: Publish built site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Copy build output for Pages
        run: |
          rm -rf assets
          cp -R dist/* .
          printf 'moapic.art\n' > CNAME
          touch .nojekyll

      - name: Commit built Pages files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets CNAME .nojekyll
          if git diff --cached --quiet; then
            echo "No built site changes to commit."
          else
            git commit -m "build: publish GitHub Pages assets"
            git push
          fi
